name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Audit (no magic numbers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Create venv + install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Run audit (strict)
        run: .venv/bin/python -m synoros_lib.audit src/ --strict

  test:
    name: Tests (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Create venv + install (with CPU torch)
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install --index-url https://download.pytorch.org/whl/cpu torch
      - name: Run pytest
        run: .venv/bin/python -m pytest tests/ -v
        continue-on-error: true  # tests/ may be empty during early build-out
